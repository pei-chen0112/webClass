<!DOCTYPE html>
<html>
<head>
<style>
  table {
    /* 1. 邊框合併為單一邊框 */
    border-collapse: collapse;
    width: 300px;
  }
  table, th, td {
    border: 1px solid black;
  }
  th, td {
    /* 2. th 與 td 的內距 (padding) 為 5px */
    padding: 5px;
    /* 3. 文字向左對齊 */
    text-align: left;
  }
</style>
</head>
<body>

<table>
  <tr>
    <th>Name</th>
    <th>Student ID</th>
  </tr>
  <tr>
    <td>曾培宸</td>
    <td>113403025</td>
  </tr>
</table>

</body>
</html>
